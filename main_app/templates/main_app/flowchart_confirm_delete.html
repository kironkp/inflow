{% extends 'base.html' %}
{% load static %}
{% block title %}Delete {{ object.title }} · InFlow{% endblock %}

{% block content %}
<div class="confirm-card">
  <img src="{% static 'images/empty-state.svg' %}" alt="" aria-hidden="true" />
  <h1>Delete this flowchart?</h1>
  <p class="muted">"{{ object.title }}" and all its nodes will be permanently removed. This can't be undone.</p>
  <form method="post" class="confirm-actions">
    {% csrf_token %}
    <a href="{% url 'flowchart-detail' object.id %}" class="btn ghost">Cancel</a>
    <button type="submit" class="btn danger">Delete forever</button>
  </form>
</div>
{% endblock %}
